{% extends 'base.html' %}

{% block content %}
<h1 class="mb-4">Checkout</h1>

<div class="row">
    <div class="col-md-8">
        <h3>Order Summary</h3>
        <table class="table">
            <thead>
                <tr>
                    <th>Product</th>
                    <th>Quantity</th>
                    <th>Price</th>
                </tr>
            </thead>
            <tbody>
                {% for item in cart %}
                <tr>
                    <td>{{ item.product.name }}</td>
                    <td>{{ item.quantity }}</td>
                    <td>${{ item.total_price }}</td>
                </tr>
                {% endfor %}
            </tbody>
            <tfoot>
                <tr>
                    <td colspan="2"><strong>Total</strong></td>
                    <td><strong>${{ cart.get_total_price }}</strong></td>
                </tr>
            </tfoot>
        </table>
    </div>
    
    <div class="col-md-4">
        <h3>Shipping Address</h3>
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label>Select Address:</label>
                <select name="address" class="form-select" required>
                    {% for address in addresses %}
                    <option value="{{ address.id }}">
                        {{ address.full_name }} - {{ address.address_line1 }}, {{ address.city }}
                    </option>
                    {% endfor %}
                </select>
            </div>
            <button type="submit" class="btn btn-primary w-100">Continue to Payment</button>
        </form>
    </div>
</div>
{% endblock %}
